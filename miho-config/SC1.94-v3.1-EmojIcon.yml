############### 全局基础配置 start ###############
port: 7890                  # HTTP 代理端口，默认 7890
socks-port: 7891            # SOCKS5 代理端口，默认 7891
mixed-port: 7892            # 混合端口，默认7892，同时支持 HTTP(S) 和 SOCKS5 协议
allow-lan: true             # 是否允许局域网设备连接
bind-address: "*"           # 绑定所有 IP 地址，默认会绑定到 127.0.0.1（本地回环地址），而 * 表示允许从任何网络接口连接
mode: rule                  # 使用规则模式分流
log-level: warning          # 日志级别
tcp-concurrent: true        # 启用 TCP 并发连接，将会使用 dns 解析出的所有 IP 地址进行连接，使用第一个成功的连接
unified-delay: true         # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差
global-client-fingerprint: chrome
keep-alive-idle: 600
keep-alive-interval: 15
profile:
  store-selected: true
  store-fake-ip: true

# 为防止使用插件朋友遇到面板问题，我注释掉了此模块。
# external-controller: :9090        # 外部控制面板端口
# secret: ""
# external-ui: ui
# external-ui-name: zashboard
# external-ui-url: "https://github.com/Zephyruso/zashboard/archive/refs/heads/gh-pages.zip"

# 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
# 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
# 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
# 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
# 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
respect-rules: true

# 嗅探（fakeip下其实可以不用嗅探）
sniffer:
  enable: true
  sniff:
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true     # 是否使用嗅探结果作为实际访问，默认为 true
    TLS:
      ports: [443, 8443]
    QUIC:
      ports: [443, 8443]
  skip-domain:      # 需要跳过嗅探的域名。主要解决部分站点sni字段非域名，导致嗅探结果异常的问题，如米家设备
    - "Mijia Cloud"
    - "+.push.apple.com"

# 入站  
tun:
  enable: true      # 是否启用 tun 模式来路由全局流量
  stack: mixed      # tun 模式堆栈,可用值system/gvisor/mixed/lwip,如无使用问题,建议使用 system 栈;MacOS 用户推荐 gvisor栈
  dns-hijack: ["any:53", "tcp://any:53"]      # dns劫持,一般设置为 any:53 即可, 即劫持所有 53 端口的 udp 流量
#   device: nikki      # 使用Nikki时，混入全部不修改的情况，开启接口指定为nikki
# ↓↓↓使用仅内核自行修改下面三项为true——一般情况下不用修改
  #device: utun0      # 指定 tun 网卡名称,MacOS 设备只能使用 utun 开头的网卡名
  auto-route: false      # 自动设置全局路由,可以自动将全局流量路由进入 tun 网卡
  auto-redirect: false
  auto-detect-interface: false      # 自动选择流量出口接口,多出口网卡同时连接的设备建议手动指定出口网卡

# > DNS各项设置官方说明 https://merlinkodo.github.io/Clash-Rev-Doc/config/dns/#nameserver-policy
dns:
  enable: true   
  ipv6: false
  listen: 0.0.0.0:7874      # 开启 DNS 服务器监听
  enhanced-mode: fake-ip      # 模式切换 redir-host / fake-ip
  fake-ip-range: 198.18.0.1/16      # fake-ip 池设置 
  fake-ip-filter-mode: blacklist      # 默认blacklist，匹配成功不返回fake-ip；可改为whitelist，即只有匹配成功才返回fake-ip
  fake-ip-filter:      # 配置不使用 fake-ip 的域名
    - rule-set:fakeipfilter_domain
  nameserver-policy:
    'www.baidu.com': '114.114.114.114'
    '+.internal.crop.com': '10.0.0.1'
    'geosite:geolocation-!cn': [tls://8.8.4.4, https://1.0.0.1/dns-query]
    'www.baidu.com,+.google.cn': https://doh.pub/dns-query
    'geosite:private,apple': https://dns.alidns.com/dns-query
    'rule-set:google_domain': 8.8.8.8
    'rule-set:youtube_domain': 8.8.8.8

  default-nameserver:
    - https://223.5.5.5/dns-query
  nameserver:      # 默认的域名解析服务器，如不配置fallback/proxy-server-nameserver, 则所有域名都由这里的nameserver解析
    - 223.5.5.5
    - 119.29.29.29
  proxy-server-nameserver:     # 代理节点域名解析服务器，仅用于解析代理节点的域名，如果不填则遵循nameserver-policy、nameserver和fallback的配置
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
#  fallback:      # 后备域名解析服务器，一般情况下使用境外DNS, 保证结果可信；配置fallback后默认启用fallback-filter, geoip-code为 n 
#    - tls://dns.google
#    - https://1.0.0.1/dns-query
############### 全局基础配置 end ###############

