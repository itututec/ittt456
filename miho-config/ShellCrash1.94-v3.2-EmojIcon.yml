# Mihomo内核v1.9+版本 通用（链式代理）配置模板 —— OpenClash/Nikki/ClashParty/ClashVerg/ShellCrash使用(ShellCrash使用时默认不能使用数据锚点)
# 版本：v3.2-260415
# 作者：ittt456
# 声明：仅作学习交流用，不得用于违法用途，不为使用后果负责
# 包含：机场订阅/单独节点添加 + 住宅 SOCKS5 链式代理 + 一机一IP + 防止 DNS/WebRTC 泄漏 + 多分流规则 + DNS防泄露 + Listeners入站多端口
# Nikki特别注意：使用Nikki插件之前，需要在 网络 -> DHCP/DNS -> DNS 重定向这一选项请关闭勾选，否则会冲突导致网络异常
# 使用说明：在linux中启用ShellCrash前，务必保证安装了iptables或者保证系统能转发流量，然后将该配置文件放置在/tmp 文件夹下并改名为 config.yaml，再启动ShellCrash会自动捕捉到配置文件，根据其实导入并启动即可
# 新功能：针对ShellCrash在DNS防污方面做了优化 / GEODATA引用 / Listeners入站多端口

############### 订阅或节点配置 start ###############
# ──────────────── 机场订阅配置 ────────────────
proxy-providers:  
  69yun:    # 机场名称，需自定义修改；可以定义多个机场（复制这一段代码修改url即可配置多个机场）
    url: "https://checkhere.top/link/********************"     # 机场订阅链接
    type: http         # 订阅类型为 http，意味着这个链接返回的是 HTTP 格式的代理列表。
    interval: 43200
    filter: "^((?!(Traffic|Expire|Premium|频道|订阅|剩余|到期|重置|服|邮箱|国内|永久|折|涨|云|时间)).)*$"        # 不包含其他杂项节点
    health-check:      
      enable: true     # 启用健康检查
      url: https://www.gstatic.com/generate_204      # 检查节点是否可用的测试网址
      interval: 300    # 健康检查的间隔，单位秒
    proxy: DIRECT      # 拉取订阅时，通过代理或直连，一般直连DIRECT，如果是代理则填写代理节点的名称
    # override:
      # dialer-proxy: 🇭🇰 香港节点     # 可以填中继节点或节点组
    # payload:         # 以下是落地节点——通常是购买的专用的SOCKS5节点
