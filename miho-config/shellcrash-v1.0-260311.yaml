# ShellCrash-1.9.4版本 通用（链式代理）配置模板
# 版本：v1.0-260311
# 作者：ittt456
# 包含：机场订阅/单独节点添加 + 住宅 SOCKS5 链式代理 + 一机一IP，防止 DNS/WebRTC 泄漏；多分流规则，DNS防泄露
# 提示：请务必将配置文件中【必改】部分按需修改为自己的真实信息方可使用—— #注释部分根据需要修改或删除或保留注释
# 声明：仅作学习用，不得用于违法用途，不为使用后果负责
# 新增 故障转移策略组
# 注意：ShellCrash 不支持锚点数据引用——故无法直接使用 OpenClash 使用锚点数据格式的 配置模板
# 如何使用：在linux中启用ShellCrash前，务必保证安装了iptables或者保证系统能转发流量，然后将该配置文件放置在/tmp 文件夹下并改名为 config.yaml，再启动ShellCrash会自动捕捉到配置文件，根据其实导入并启动即可

# ──────────────── 全局基础设置 ────────────────
port: 7890                        # HTTP 代理端口，默认 7890
socks-port: 7891                  # SOCKS5 代理端口，默认 7891
allow-lan: true                   # 是否允许局域网设备连接
mode: rule                        # 使用规则模式分流
log-level: info                   # 日志级别
external-controller: :9090        # 外部控制面板端口

# 配置后面的nameserver、fallback和nameserver-policy向dns服务器的连接过程是否遵守遵守rules规则
# 如果为false（默认值）则这三部分的dns服务器在未特别指定的情况下会直连
# 如果为true，将会按照rules的规则匹配链接方式（走代理或直连），如果有特别指定则任然以指定值为准
# 仅当proxy-server-nameserver非空时可以开启此选项, 强烈不建议和prefer-h3一起使用
# 此外，这三者配置中的dns服务器如果出现域名会采用default-nameserver配置项解析，也请确保正确配置default-nameserver
respect-rules: true

tcp-concurrent: true        # 启用 TCP 并发连接，将会使用 dns 解析出的所有 IP 地址进行连接，使用第一个成功的连接
unified-delay: true         # 开启统一延迟时，会计算 RTT，以消除连接握手等带来的不同类型节点的延迟差

# 入站  
tun:
  enable: true      # 是否启用 tun 模式来路由全局流量
  stack: mixed      # tun 模式堆栈,可用值system/gvisor/mixed/lwip,如无使用问题,建议使用 system 栈;MacOS 用户推荐 gvisor栈
  dns-hijack: ["any:53", "tcp://any:53"]      # dns劫持,一般设置为 any:53 即可, 即劫持所有 53 端口的 udp 流量
  #使用nikki，混入全部不修改的情况，开启接口指定为nikki
  #使用仅内核自行修改下面三项为true
  #device: utun0      # 指定 tun 网卡名称,MacOS 设备只能使用 utun 开头的网卡名
  auto-route: false      # 自动设置全局路由,可以自动将全局流量路由进入 tun 网卡
  auto-redirect: false
  auto-detect-interface: false      # 自动选择流量出口接口,多出口网卡同时连接的设备建议手动指定出口网卡

# ──────────────── DNS 设置（防 DNS 泄漏） ────────────────
#--------------------DNS各项设置官方说明 https://merlinkodo.github.io/Clash-Rev-Doc/config/dns/#nameserver-policy
dns:
  enable: true   
  ipv6: false
  listen: 0.0.0.0:7874                                                             # 开启 DNS 服务器监听
  enhanced-mode: fake-ip                                            # 模式切换 redir-host / fake-ip
  fake-ip-range: 198.18.0.1/16                                       # fake-ip 池设置 
  
 # 配置fake-ip-filter的匹配模式，默认为blacklist，即如果匹配成功不返回fake-ip
 # 可设置为whitelist，即只有匹配成功才返回fake-ip
 # fake-ip-filter-mode: blacklist
  
 # 默认的域名解析服务器，如不配置 fallback/proxy-server-nameserver , 则所有域名都由 nameserver 解析
  nameserver:                    # 保留
    - 223.5.5.5
    - 119.29.29.29
    
 # 后备域名解析服务器，一般情况下使用境外 DNS, 保证结果可信
 # 配置 fallback后默认启用 fallback-filter,geoip-code为 cn 
  fallback:                   # 保留
    - 9.9.9.9
    - 8.8.8.8
    - tls://1.1.1.1

# 配置不使用 fake-ip 的域名
 # 通配符 * 一次只能匹配一级域名，比如*.baidu.com 只匹配 tieba.baidu.com 而不匹配 123.tieba.baidu.com 或者 baidu.com
 # 通配符 + 类似 DOMAIN-SUFFIX, 可以一次性匹配多个级别，比如＋.baidu.com 匹配 tieba.baidu.com 和 123.tieba.baidu.com 或者 baidu.com
 # 通配符 . 可以一次性匹配多个级别，比如.baidu.com 匹配 tieba.baidu.com 和 123.tieba.baidu.com, 但不能匹配 baidu.com
  fake-ip-filter:
    - localhost.ptlogin2.qq.com
    - 'stun.*.*'
    - '*.stun.*'	
    - "+.lan"
    - "+.local"
    - "rule-set:private_domain,cn_domain"         # 引入域名集合
    - "+.services.googleapis.cn"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
    - "+.pool.ntp.org"
    - "+.ntp.tencent.com"
    - "+.ntp1.aliyun.com"
    - "+.ntp.ntsc.ac.cn"
    - "+.cn.ntp.org.cn"
    - geosite:cn 
 
# 专用于 代理节点域名解析的 DNS 服务器，非必要配置项，如果不填则遵循nameserver-policy、nameserver和fallback的配置
  proxy-server-nameserver:
    - 114.114.114.114
    - 119.29.29.29
    - 8.8.8.8
    - 1.1.1.1

# ──────────────── 机场订阅节点配置 ────────────────
