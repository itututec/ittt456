  - {"type":"hysteria2","name":"🇺🇲 US_DediRock-hy2-pD","server":"198.46.182.189","port":61442,"password":"password":"6******0-971b-4d9d-ac45-2f******8f95","sni":"www.bing.com","skip-cert-verify":true,"tfo":false}
  - {"type":"tuic","name":"🇺🇲 US_DediRock-tuic-pD","server":"198.46.182.189","port":60976,"password":"password":"6******0-971b-4d9d-ac45-2f******8f95","uuid":"a5a45239-e193-458c-9a34-98b25e3fd099","congestion-controller":"bbr","udp-relay-mode":"native","alpn":["h3"],"sni":"www.bing.com","skip-cert-verify":true,"allowInsecure":"1","version":5}
