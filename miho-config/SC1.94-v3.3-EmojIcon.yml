# Mihomo v1.9+版本 通用（链式代理）配置模板
# 版本：v3.3-260420
# 作者：ittt456
# 包含：机场订阅/单独节点添加 + 住宅 SOCKS5 链式代理 + 一机一IP，防止 DNS/WebRTC 泄漏；多分流规则，DNS防泄露
# 声明：仅作学习用，不得用于违法用途，不为使用后果负责
# Nikki特别注意：使用Nikki插件之前，需要在 网络 -> DHCP/DNS -> DNS 重定向这一选项请关闭勾选，否则会冲突导致网络异常
# 说明：该模板配置文件可供Mihomo内核的OpenClash/Nikki/ClashParty/ClashVerg/ShellCrash使用(给ShellCrash使用时不能使用数据锚点)
# 如何使用：在linux中启用ShellCrash前，务必保证安装了iptables或者保证系统能转发流量，然后将该配置文件放置在/tmp 文件夹下并改名为 config.yaml，再启动ShellCrash会自动捕捉到配置文件，根据其实导入并启动即可
# 新功能：针对ShellCrash在DNS防污方面做了微调和优化 / GEODATA引用 / Listeners入站多端口

############### 订阅或节点配置 start ###############
# ──────────────── 机场订阅配置 ────────────────
proxy-providers:  
  69yun:    # 机场名称，需自定义修改；可以定义多个机场（复制这一段代码修改url即可配置多个机场）
    url: "https://checkhere.top/link/omMh**************BY?clash=1"     # 机场订阅链接
    type: http
    interval: 43200
    filter: "^((?!(Traffic|Expire|Premium|频道|订阅|剩余|到期|重置|服|邮箱|国内|永久|折|涨|云|时间)).)*$"        # 不包含其他杂项节点
    health-check:      
      enable: true     # 启用健康检查
      url: https://www.gstatic.com/generate_204      # 检查节点是否可用的测试网址
      interval: 300    # 健康检查的间隔，单位秒
    proxy: 直连      # 如果订阅节点暂时不可用或健康检查失败，流量直接走本地，不经过代理
    # override:
      # dialer-proxy: 🇭🇰 香港节点     # 可以填中继节点或节点组
    # payload:     # 以下是落地节点——通常是购买的专用的SOCKS5节点
      # - {"name":"香港落地1", "type":"ss","server":"23.175.201.164","port":80,"cipher":"2022-blake3-aes-128-gcm","password":"UETm2mAIRiCaVJuIe1t0cA==","udp":true}
      # - {"name":"美国落地1", "type":"ss","server":"23.175.201.164","port":80,"cipher":"2022-blake3-aes-128-gcm","password":"UETm2mAIRiCaVJuIe1t0cA==","udp":true}

# ──────────────── 节点配置，可添加多个节点，每行一个 ────────────────
proxies:
# >>> 将英文版本的direct/reject转化为中文版，实际可以不需要，直接在策略组立马用英文的就可以 <<<
  - {name: 直连, type: direct}     # 选用——非必须，可用 直连 节点，替换策略组中的 DIRECT或direct
#  - {name: 拒绝, type: reject}     # 选用——非必须，可用 直连 节点，替换策略组中的 REJECT或reject
 
# >>> 自定义节点——通过VPS / NAT小鸡 部署 或 购买的 SK5 落地节点
# ----- 示例节点 -----
# - {name: bpb01, server: 1.2.3.4, port: 443, type: trojan, password: pass123, sni: example.com, skip-cert-verify: false, network: ws, ws-opts: {path: /demo_path, headers: {Host: example.com}}}
