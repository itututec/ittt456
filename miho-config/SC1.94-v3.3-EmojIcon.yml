  - {"type":"anytls","name":"🇯🇵 JP_vitebits-anytls-pD","server":"141.147.156.175","port":64633,"skip-cert-verify":true,"password":"6******0-971b-4d9d-ac45-2f******8f95","allowInsecure":"1"}
  - {"type":"hysteria2","name":"🇯🇵 JP_vitebits-hy2-pD","server":"141.147.156.175","port":29802,"password":"password":"6******0-971b-4d9d-ac45-2f******8f95","sni":"www.bing.com","skip-cert-verify":true,"tfo":false}
  - {"type":"tuic","name":"🇯🇵 JP_vitebits-tuic-pD","server":"141.147.156.175","port":50531,"password":"password":"6******0-971b-4d9d-ac45-2f******8f95","uuid":"625b36e0-971b-4d9d-ac45-2f2bfba68f95","congestion-controller":"bbr","udp-relay-mode":"native","alpn":["h3"],"sni":"www.bing.com","skip-cert-verify":true,"allowInsecure":"1","version":5}
