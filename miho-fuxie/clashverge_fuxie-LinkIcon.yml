## 链式代理（组）配置
# -------------------- dialer-proxy 链式代理（推荐，但设置略微复杂） -------------------- ##
## a 基于关键字dialer-proxy的链式代理做法（推荐用法）；
# 1.1 需要在前端的订阅配置文件（不是这里的覆写配置文件）中的proxies下的节点中额外定义关键字dialer-proxy指向中继节点或中继节点组，表示通过中继节点路由连接到落地节点；
# 前端案例格式参考（可以是单个节点，也可以是策略组）:
  # - name: 链代落地-住宅A              # 落地节点——表示该节点通过中继节点（组）连接到
  #   type: socks5
  #   server: 184.178.172.13           # 【必改】SOCKS5 的IP地址
  #   port: 15311                      # 【必改】端口号
  #   username:                        # 【必改】用户名，没有就注释掉
  #   password:                        # 【必改】密码，没有就注释掉
  #   udp: true
  #   dialer-proxy: 华东中继            # 应用已经定义的 中继节点或节点组 名称

# -------------------- relay 链式代理（不推荐，但设置简单） -------------------- ##
# b 基于关键字relay的链式代理做法——不推荐，有很多缺点(如udp异常/grpc延迟过高等)——官方已有新方法即dialer-proxy，但relay依然可用；
# 1.1 只需在本覆写模板配置文件中定义好type为relay的链式代理节点组，不需要在前端订阅配置文件proxies下添加定义关键字dialer-proxy信息。
# 案例格式参考：
#  - {name: 华东中继, type: relay, proxies: [中继节点(组)名称, 落地节点(组)名称]}                              #范例基本书写格式，表示通过 中继节点(组)→→→落地节点(组)
# 👉👉👉↓↓↓以下四行是实际范例书写格式和注释说明↓↓↓
#  - {name: 链代落地-住宅A, type: select, include-all: true, filter: "(?i)链|链式代理|SK5|http|SOCKS5"}       #范例落地节点组，一般是目的地住宅SOCKS5节点，无法直连，所以要借助中继路由过去连接
#  - {name: 华东中继, type: select, proxies: [日本故转, 台湾故转, 日本自动, 台湾自动, 日本节点, 台湾节点]}       #范例华东中继组
#  - {name: 华南中继, type: select, proxies: [香港故转, 狮城故转, 香港自动, 狮城自动, 香港节点, 狮城节点]}       #范例华南中继组
#  - {name: relay链代, type: relay, proxies: [华东中继, 链代落地-住宅A]}            #relay链式代理，表示通过 华东中继→→→链代落地-住宅A
  # relay特别说明(参考https://clash-meta.gitbook.io/clash.meta-wiki-older/function/proxygroups/relay 和 https://merlinkodo.github.io/Clash-Rev-Doc/config/proxy-groups/relay/)：
   # 1 relay支持传输UDP，前提是代理链的头尾节点都要支持 UDP over TCP。目前支持 udp 的协议有 vmess/vless/trojan/ss/ssr/tuic/hy，不支持udp协议的是不能使用relay实现链式代理的；
   # 2 添加type为relay的代理组，且该代理组的节点顺序是，打底/中继节点(组)名称在前，落地socks5节点(组)名称在后(落地节点必须支持udp协议，设置建议打开udp为true)；
   # 3 为保证设置好的 relay链式代理 可以在clash内核的UI界面中被选择到，需要在Proxy Groups中的 手动选择组里面包含有上面定义好的 relay链式代理 名称，否则虽然定义了该链式代理，但无法在UI中选择也是白搭。

